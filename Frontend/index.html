<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Productivity Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
  /* ===== Ultra Professional Dark Theme ===== */

  :root {
    --bg-main: #0f172a;
    --bg-card: rgba(30, 41, 59, 0.75);
    --border-color: rgba(148, 163, 184, 0.15);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --success: #10b981;
    --danger: #ef4444;
  }

  body {
    background: radial-gradient(circle at top left, #1e293b, #0f172a 60%);
    color: var(--text-primary);
    font-family: "Inter", sans-serif;
  }

  /* Header */
  h1 {
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, #818cf8, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Cards */
  .bg-white {
    background: var(--bg-card) !important;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border-color);
    box-shadow:
      0 10px 30px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
    transition: all 0.3s ease;
  }

  .bg-white:hover {
    transform: translateY(-4px);
    box-shadow:
      0 15px 40px rgba(0, 0, 0, 0.6),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }

  /* Text Styling */
  .text-slate-500 {
    color: var(--text-secondary) !important;
  }

  /* Inputs */
  textarea {
    background: #0f172a;
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    transition: all 0.25s ease;
  }

  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
  }

  /* Buttons */
  button {
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.25s ease;
    border: none;
  }

  .bg-indigo-600 {
    background: linear-gradient(135deg, #6366f1, #4f46e5) !important;
  }

  .bg-indigo-600:hover {
    background: linear-gradient(135deg, #818cf8, #6366f1) !important;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
  }

  .bg-emerald-600 {
    background: linear-gradient(135deg, #10b981, #059669) !important;
  }

  .bg-emerald-600:hover {
    background: linear-gradient(135deg, #34d399, #10b981) !important;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
  }

  /* Score Text Emphasis */
  #scoreText {
    background: linear-gradient(90deg, #22d3ee, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Table */
  table {
    border-collapse: collapse;
  }

  th {
    background: rgba(51, 65, 85, 0.7);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.5px;
  }

  td {
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
  }

  tr:hover td {
    background: rgba(99, 102, 241, 0.08);
    color: var(--text-primary);
  }

  /* Chart Canvas */
  canvas {
    filter: brightness(0.9) contrast(1.1);
  }

  /* Scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
  }

  ::-webkit-scrollbar-track {
    background: #0f172a;
  }

  ::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 10px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #475569;
  }
</style>
</head>
<body class="p-6 min-h-screen">
  <div class="max-w-5xl mx-auto space-y-6">
    <header class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">Student Productivity Coach</h1>
      <button id="exportBtn" class="bg-emerald-600 text-white px-4 py-2 rounded">Download CSV</button>
    </header>

    <!-- NATURAL LANGUAGE INPUT -->
    <div class="bg-white p-4 rounded-xl shadow space-y-3">
      <textarea id="nlInput" rows="4" class="w-full border p-3 rounded"
        placeholder="Describe your day (e.g., Studied 3 hours, slept 6 hours, used phone 4 hours, played games 1 hour, stressed but focused)."></textarea>
      <button id="analyzeBtn" class="bg-indigo-600 text-white px-4 py-2 rounded">Analyze My Day</button>
      <p id="statusText" class="text-sm text-slate-500"></p>
    </div>

    <!-- SUMMARY -->
    <div class="bg-white p-4 rounded-xl shadow grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <p class="text-slate-500">Productivity Score</p>
        <p id="scoreText" class="text-3xl font-bold">—</p>
      </div>
      <div>
        <p class="text-slate-500">Today’s Label</p>
        <p id="labelText" class="text-2xl font-semibold">—</p>
      </div>
      <div>
        <p class="text-slate-500">Trend</p>
        <p id="trendText" class="text-xl font-medium">—</p>
      </div>
    </div>
<!-- DAILY SUMMARY SECTION -->
<div class="bg-white p-5 rounded-xl shadow space-y-3">
  <h2 class="text-lg font-semibold">Day Summary</h2>
  
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    
    <div class="p-4 rounded-lg border border-slate-700 bg-slate-800/40">
      <p class="text-slate-400 text-sm">Performance Insight</p>
      <p id="summaryPerformance" class="text-base font-medium">
        —
      </p>
    </div>

    <div class="p-4 rounded-lg border border-slate-700 bg-slate-800/40">
      <p class="text-slate-400 text-sm">Behavior Pattern</p>
      <p id="summaryBehavior" class="text-base font-medium">
        —
      </p>
    </div>

    <div class="p-4 rounded-lg border border-slate-700 bg-slate-800/40">
      <p class="text-slate-400 text-sm">Recommendation</p>
      <p id="summaryRecommendation" class="text-base font-medium">
        —
      </p>
    </div>

  </div>
</div>
    <!-- CHART -->
    <div class="bg-white p-4 rounded-xl shadow">
      <canvas id="trendChart" height="120"></canvas>
    </div>
<!-- TOMORROW IMPROVEMENT TIPS SECTION -->
<div class="bg-white p-5 rounded-xl shadow space-y-3">
  <h2 class="text-lg font-semibold">Tip for Tomorrow</h2>
  
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    <div class="p-4 rounded-lg border border-slate-700 bg-slate-800/40">
      <p class="text-slate-400 text-sm">Focus Strategy</p>
      <p id="tomorrowFocusTip" class="text-base font-medium">
        —
      </p>
    </div>

    <div class="p-4 rounded-lg border border-slate-700 bg-slate-800/40">
      <p class="text-slate-400 text-sm">Energy Optimization</p>
      <p id="tomorrowEnergyTip" class="text-base font-medium">
        —
      </p>
    </div>

    <div class="p-4 rounded-lg border border-slate-700 bg-slate-800/40">
      <p class="text-slate-400 text-sm">Distraction Control</p>
      <p id="tomorrowDistractionTip" class="text-base font-medium">
        —
      </p>
    </div>

  </div>
</div>
    <!-- TABLE -->
    <div class="bg-white p-4 rounded-xl shadow overflow-x-auto">
      <table class="min-w-full text-sm border">
        <thead class="bg-slate-100">
          <tr>
            <th class="p-2 border">Date</th>
            <th class="p-2 border">Score</th>
            <th class="p-2 border">Label</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

<script>
  // 🔵 Replace with your Cohere API key
  const COHERE_KEY = "OPJ5W3QIS98JY4bls7TqzwJ2v4DWES7X3B5BBXDg";
  const COHERE_URL = "https://api.cohere.com/v2/chat";

  const API_URL = "https://student-productivity-backend.onrender.com/predict";
  const STORAGE_KEY = "productivity_logs_nlp";

  let logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let chart = null;

  function fillBestDefaults(obj) {
    const defaults = {
      study_hours_per_day: 0,
      sleep_hours: 8,
      phone_usage_hours: 0,
      social_media_hours: 0,
      youtube_hours: 0,
      gaming_hours: 0,
      stress_level: 5,
      focus_score: 5,
      attendance_percentage: 50,
      exercise_minutes: 0,
      coffee_intake_mg: 0,
      assignments_completed: 0,
      final_grade: 50
    };

    const filled = {};
    for (const key in defaults) {
      let v = obj?.[key];

      if (typeof v === "string" && v.includes("%")) {
        v = parseFloat(v.replace("%", ""));
      }

      if (v === null || v === undefined || Number.isNaN(Number(v))) {
        v = defaults[key];
      }

      if (key === "stress_level" || key === "focus_score") {
        v = Math.min(10, Math.max(1, Number(v)));
      }

      if (key === "attendance_percentage") {
        v = Math.min(100, Math.max(0, Number(v)));
      }

      filled[key] = Number(v);
    }
    return filled;
  }
async function extractWithCohere(text) {
  try {
    if (!text || !text.trim()) {
      console.error("Empty input text");
      return null;
    }

    const res = await fetch("https://api.cohere.com/v2/chat", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${COHERE_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "command-a-03-2025",
        temperature: 0,
        messages: [
          {
            role: "system",
            content: [
              { type: "text", text: "You convert daily activity text into STRICT JSON only. The focus_score,final_grade and stress_level should be calculated using the given data and also fill the other data from your logic don't return it with null" }
            ]
          },
          {
            role: "user",
            content: [
              {
                type: "text",
                text: `
Return JSON with EXACT keys. Use numbers or null only.

{
  "study_hours_per_day": number|null,
  "sleep_hours": number|null,
  "phone_usage_hours": number|null,
  "social_media_hours": number|null,
  "youtube_hours": number|null,
  "gaming_hours": number|null,
  "stress_level": number|null,
  "focus_score": number|null,
  "attendance_percentage": number|null,
  "exercise_minutes": number|null,
  "coffee_intake_mg": number|null,
  "assignments_completed": number|null,
  "final_grade": number|null
}

Text: """${text}"""
`
              }
            ]
          }
        ]
      })
    });

    const data = await res.json();
    console.log("Cohere raw response:", data);

    let raw = data.message?.content?.[0]?.text || "";

    raw = raw.replace(/```json|```/g, "").trim();

    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) {
      console.error("Could not extract JSON:", raw);
      return null;
    }

    return JSON.parse(jsonMatch[0]);

  } catch (err) {
    console.error("Cohere extraction error:", err);
    return null;
  }
}

  async function analyzeDay() {
    const text = nlInput.value.trim();
    if (!text) return alert("Describe your day first.");

    statusText.textContent = "Extracting features with Cohere…";
    let features = await extractWithCohere(text);

    if (!features) {
      alert("LLM extraction failed. Using smart defaults for demo.");
      features = {};
    }

    features = fillBestDefaults(features);
    statusText.textContent = "Sending to ML model…";

    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(features)
    });

    const out = await res.json();
    const score = Number(out.productivity_score);

    if (Number.isNaN(score)) {
      console.error("Invalid ML response:", out);
      alert("ML returned invalid score. Check backend logs.");
      statusText.textContent = "ML returned invalid score ❌";
      return;
    }

    scoreText.textContent = score.toFixed(2);
    labelText.textContent = out.label || "—";

    logs.push({
      date: new Date().toLocaleString(),
      score: score,
      label: out.label
    });

    localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));

    updateTrend();
    renderTable();
    renderChart();

    statusText.textContent = "Done";
    nlInput.value = "";
  }

  function updateTrend() {
    if (logs.length < 2) {
      trendText.textContent = "—";
      return;
    }

    trendText.textContent =
      logs.at(-1).score >= logs.at(-2).score
        ? "Improving 📈"
        : "Declining 📉";
  }

  function renderTable() {
    tableBody.innerHTML = "";
    logs.forEach(r => {
      tableBody.innerHTML += `
        <tr>
          <td class="p-2 border">${r.date}</td>
          <td class="p-2 border">${Number(r.score).toFixed(2)}</td>
          <td class="p-2 border">${r.label}</td>
        </tr>`;
    });
  }

  function renderChart() {
    const labels = logs.map(l => l.date);
    const data = logs.map(l => Number(l.score/100));

    if (chart) chart.destroy();

    chart = new Chart(trendChart, {
      type: "line",
      data: {
        labels,
        datasets: [{
          data,
          tension: 0.3
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: { x: { display: false } }
      }
    });
  }

  exportBtn.onclick = () => {
    if (!logs.length) return alert("No data");

    const rows = [["date","score","label"].join(",")];
    logs.forEach(r =>
      rows.push([r.date, r.score, r.label].map(v => `"${v}"`).join(","))
    );

    const blob = new Blob([rows.join("\n")], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "productivity_logs.csv";
    a.click();
  };

  analyzeBtn.onclick = analyzeDay;

  renderTable();
  renderChart();
  updateTrend();
</script>
</body>
</html>

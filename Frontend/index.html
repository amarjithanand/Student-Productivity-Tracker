<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Productivity Coach | Amarjith Anand</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg-main:#0f172a;
  --bg-card:rgba(30,41,59,0.75);
  --border:rgba(148,163,184,0.15);
  --text:#f1f5f9;
  --muted:#94a3b8;
  --accent:#6366f1;
}

body{
  background:radial-gradient(circle at top left,#1e293b,#0f172a 60%);
  color:var(--text);
  font-family:Inter,sans-serif;
}

.bg-white{
  background:var(--bg-card)!important;
  backdrop-filter:blur(14px);
  border:1px solid var(--border);
}

textarea{
  background:#0f172a;
  border:1px solid var(--border);
  color:var(--text);
}

textarea:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(99,102,241,0.3);
}

button{
  transition:0.2s ease;
}

.bg-indigo-600{
  background:linear-gradient(135deg,#6366f1,#4f46e5)!important;
}

.bg-indigo-600:hover{
  transform:translateY(-2px);
}

.bg-emerald-600{
  background:linear-gradient(135deg,#10b981,#059669)!important;
}

#scoreText{
  background:linear-gradient(90deg,#22d3ee,#818cf8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
</style>
</head>

<body class="p-6 min-h-screen">
<div class="max-w-5xl mx-auto space-y-6">

<header class="flex justify-between items-center">
  <h1 class="text-2xl font-bold">Student Productivity Coach</h1>
  <button id="exportBtn" class="bg-emerald-600 px-4 py-2 rounded text-white">
    Download CSV
  </button>
</header>

<!-- INPUT -->
<div class="bg-white p-4 rounded-xl space-y-3">
  <textarea id="nlInput" rows="4" class="w-full p-3 rounded"
    placeholder="Describe your day..."></textarea>
  <button id="analyzeBtn" class="bg-indigo-600 px-4 py-2 rounded text-white">
    Analyze My Day
  </button>
  <p id="statusText" class="text-sm text-slate-400"></p>
</div>

<!-- SUMMARY NUMBERS -->
<div class="bg-white p-4 rounded-xl grid grid-cols-1 md:grid-cols-3 gap-4">
  <div>
    <p class="text-slate-400">Productivity Score</p>
    <p id="scoreText" class="text-3xl font-bold">—</p>
  </div>
  <div>
    <p class="text-slate-400">Today's Label</p>
    <p id="labelText" class="text-2xl font-semibold">—</p>
  </div>
  <div>
    <p class="text-slate-400">Trend</p>
    <p id="trendText" class="text-xl">—</p>
  </div>
</div>

<!-- DAILY SUMMARY -->
<div class="bg-white p-5 rounded-xl">
  <h2 class="text-lg font-semibold mb-2">Daily Analysis</h2>
  <p id="dailySummary" class="leading-relaxed text-slate-300">—</p>
</div>

<!-- TOMORROW TIP -->
<div class="bg-white p-5 rounded-xl">
  <h2 class="text-lg font-semibold mb-2">Tip for Future</h2>
  <p id="tomorrowTip" class="leading-relaxed text-slate-300">—</p>
</div>

<!-- CHART -->
<div class="bg-white p-4 rounded-xl">
  <canvas id="trendChart" height="120"></canvas>
</div>

  <!-- TABLE -->
<div class="bg-white p-4 rounded-xl overflow-x-auto">
  <table class="min-w-full text-sm">
    <thead>
      <tr>
        <th class="p-2">Date</th>
        <th class="p-2">Score</th>
        <th class="p-2">Label</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

  
</div>

<script>

/* ---------------- CONFIG ---------------- */

const COHERE_KEY = "OPJ5W3QIS98JY4bls7TqzwJ2v4DWES7X3B5BBXDg";

const API_URL = "https://student-productivity-backend.onrender.com/predict";
const STORAGE_KEY = "productivity_logs";

let logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let chart = null;

/* ---------------- COHERE FEATURE EXTRACTION ---------------- */

async function extractFeatures(text){

  const res = await fetch("https://api.cohere.com/v2/chat",{
    method:"POST",
    headers:{
      "Authorization":`Bearer ${COHERE_KEY}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:"command-a-03-2025",
      temperature:0,
      messages:[
        {
          role:"user",
          content:[{
            type:"text",
            text:`
Return STRICT JSON only:

{
"study_hours_per_day":number,
"sleep_hours":number,
"phone_usage_hours":number,
"social_media_hours":number,
"youtube_hours":number,
"gaming_hours":number,
"stress_level":number,
"focus_score":number,
"attendance_percentage":number,
"exercise_minutes":number,
"coffee_intake_mg":number,
"assignments_completed":number,
"final_grade":number
}

Text: """${text}"""
`
          }]
        }
      ]
    })
  });

  const data = await res.json();
  let raw = data.message?.content?.[0]?.text || "";
  raw = raw.replace(/```json|```/g,"").trim();
  return JSON.parse(raw.match(/\{[\s\S]*\}/)[0]);
}

/* ---------------- GEMINI SUMMARY ---------------- */
function generateSummary(features, score, label) {

  let positives = [];
  let negatives = [];

  if (features.study_hours_per_day >= 4)
    positives.push("strong study duration");

  if (features.sleep_hours >= 7)
    positives.push("adequate sleep");

  if (features.phone_usage_hours > 3)
    negatives.push("high phone usage");

  if (features.stress_level > 7)
    negatives.push("elevated stress levels");

  let summary = `Today showed ${positives.join(", ") || "moderate productivity habits"}. 
However, ${negatives.join(", ") || "no major distractions were observed"}. 
This explains the productivity score of ${score.toFixed(1)} and the "${label}" classification.`;

  let tip = "Try maintaining consistent study blocks and reduce unnecessary screen time tomorrow.";

  return {
    daily_summary: summary,
    tomorrow_tip: tip
  };
}
/* ---------------- MAIN ANALYZE FUNCTION ---------------- */

async function analyzeDay(){

  const text = nlInput.value.trim();
  if(!text) return alert("Describe your day first.");

  statusText.textContent = "Extracting features...";
  const features = await extractFeatures(text);

  statusText.textContent = "Predicting score...";
  const res = await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(features)
  });

  const out = await res.json();
  const score = Number(out.productivity_score);

  scoreText.textContent = score.toFixed(2);
  labelText.textContent = out.label;

  statusText.textContent = "Generating AI summary...";
  const summary = await generateSummary(features, score, out.label);

  dailySummary.textContent = summary.daily_summary;
  tomorrowTip.textContent = summary.tomorrow_tip;

  logs.push({
    date:new Date().toLocaleString(),
    score,
    label:out.label
  });

  localStorage.setItem(STORAGE_KEY,JSON.stringify(logs));

  renderTable();
  renderChart();
  updateTrend();

  statusText.textContent = "Done";
  nlInput.value = "";
}

/* ---------------- UTILITIES ---------------- */

function updateTrend(){
  if(logs.length<2) return trendText.textContent="—";
  trendText.textContent =
    logs.at(-1).score>=logs.at(-2).score?
    "Improving 📈":"Declining 📉";
}
function renderTable(){
  tableBody.innerHTML="";
  logs.forEach(r=>{
    tableBody.innerHTML+=`
      <tr>
        <td class="p-2">${r.date}</td>
        <td class="p-2">${r.score.toFixed(2)}</td>
        <td class="p-2">${r.label}</td>
      </tr>`;
  });
}

  
function renderChart(){
  if(chart) chart.destroy();
  chart=new Chart(trendChart,{
    type:"line",
    data:{
      labels:logs.map(l=>l.date),
      datasets:[{
        data:logs.map(l=>l.score),
        tension:0.3
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{x:{display:false}}
    }
  });
}

exportBtn.onclick=()=>{
  if(!logs.length) return;
  const rows=[["date","score","label"].join(",")];
  logs.forEach(r=>{
    rows.push([r.date,r.score,r.label].join(","));
  });
  const blob=new Blob([rows.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="productivity_logs.csv";
  a.click();
};

analyzeBtn.onclick=analyzeDay;
renderTable();
renderChart();
updateTrend();

</script>
</body>
</html>

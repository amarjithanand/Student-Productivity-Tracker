<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Productivity Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background:#f8fafc; }
  </style>
</head>
<body class="p-6 min-h-screen">
  <div class="max-w-5xl mx-auto space-y-6">
    <header class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">Student Productivity Coach</h1>
      <button id="exportBtn" class="bg-emerald-600 text-white px-4 py-2 rounded">Download CSV</button>
    </header>

    <!-- NATURAL LANGUAGE INPUT -->
    <div class="bg-white p-4 rounded-xl shadow space-y-3">
      <textarea id="nlInput" rows="4" class="w-full border p-3 rounded"
        placeholder="Describe your day (e.g., Studied 3 hours, slept 6 hours, used phone 4 hours, played games 1 hour, stressed but focused)."></textarea>
      <button id="analyzeBtn" class="bg-indigo-600 text-white px-4 py-2 rounded">Analyze My Day</button>
      <p id="statusText" class="text-sm text-slate-500"></p>
    </div>

    <!-- SUMMARY -->
    <div class="bg-white p-4 rounded-xl shadow grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <p class="text-slate-500">Productivity Score</p>
        <p id="scoreText" class="text-3xl font-bold">—</p>
      </div>
      <div>
        <p class="text-slate-500">Today’s Label</p>
        <p id="labelText" class="text-2xl font-semibold">—</p>
      </div>
      <div>
        <p class="text-slate-500">Trend</p>
        <p id="trendText" class="text-xl font-medium">—</p>
      </div>
    </div>

    <!-- CHART -->
    <div class="bg-white p-4 rounded-xl shadow">
      <canvas id="trendChart" height="120"></canvas>
    </div>

    <!-- TABLE -->
    <div class="bg-white p-4 rounded-xl shadow overflow-x-auto">
      <table class="min-w-full text-sm border">
        <thead class="bg-slate-100">
          <tr>
            <th class="p-2 border">Date</th>
            <th class="p-2 border">Score</th>
            <th class="p-2 border">Label</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
<script>
  const OPENAI_KEY = "YOUR_OPENAI_API_KEY";   // 🔴 Replace with your key
  const OPENAI_URL = "https://api.openai.com/v1/chat/completions";
  const API_URL = "http://localhost:8000/predict";
  const STORAGE_KEY = "productivity_logs_nlp";

  let logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let chart = null;

  function fillBestDefaults(obj) {
    const defaults = {
      study_hours_per_day: 6,
      sleep_hours: 8,
      phone_usage_hours: 1,
      social_media_hours: 0,
      youtube_hours: 0.5,
      gaming_hours: 0.5,
      stress_level: 5,
      focus_score: 9,
      attendance_percentage: 90,
      exercise_minutes: 20,
      coffee_intake_mg: 100,
      assignments_completed: 3,
      final_grade: 75
    };

    const filled = {};
    for (const key in defaults) {
      let v = obj?.[key];

      if (typeof v === "string" && v.includes("%")) {
        v = parseFloat(v.replace("%", ""));
      }

      if (v === null || v === undefined || Number.isNaN(Number(v))) {
        v = defaults[key];
      }

      if (key === "stress_level" || key === "focus_score") {
        v = Math.min(10, Math.max(1, Number(v)));
      }

      if (key === "attendance_percentage") {
        v = Math.min(100, Math.max(0, Number(v)));
      }

      filled[key] = Number(v);
    }
    return filled;
  }

  async function extractWithChatGPT(text) {
    try {
      const res = await fetch(OPENAI_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${OPENAI_KEY}`
        },
        body: JSON.stringify({
          model: "gpt-4.1-mini",
          temperature: 0,
          messages: [
            { role: "system", content: "You convert daily activity text into strict JSON only." },
            { role: "user", content: `
Return JSON with EXACT keys. Use numbers or null only.
{
  "study_hours_per_day": number|null,
  "sleep_hours": number|null,
  "phone_usage_hours": number|null,
  "social_media_hours": number|null,
  "youtube_hours": number|null,
  "gaming_hours": number|null,
  "stress_level": number|null,
  "focus_score": number|null,
  "attendance_percentage": number|null,
  "exercise_minutes": number|null,
  "coffee_intake_mg": number|null,
  "assignments_completed": number|null,
  "final_grade": number|null
}
Text: """${text}"""` }
          ]
        })
      });

      const data = await res.json();
      let raw = data.choices?.[0]?.message?.content || "";
      raw = raw.replace(/```json|```/g, "").trim();

      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      if (!jsonMatch) {
        console.error("Raw LLM response:", raw);
        return null;
      }
      return JSON.parse(jsonMatch[0]);
    } catch (err) {
      console.error("ChatGPT extraction error:", err);
      return null;
    }
  }

  async function analyzeDay() {
    const text = nlInput.value.trim();
    if (!text) return alert("Describe your day first.");

    statusText.textContent = "Extracting features with ChatGPT…";
    let features = await extractWithChatGPT(text);

    if (!features) {
      alert("LLM extraction failed. Using smart defaults for demo.");
      features = {};
    }

    features = fillBestDefaults(features);
    statusText.textContent = "Sending to ML model…";

    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(features)
    });

    const out = await res.json();

    const score = Number(out.productivity_score);
if (Number.isNaN(score)) {
  console.error("Invalid ML response:", out);
  alert("ML returned invalid score. Check backend logs.");
  statusText.textContent = "ML returned invalid score ❌";
  return;
}
scoreText.textContent = score.toFixed(2);
labelText.textContent = out.label || "—";
    labelText.textContent = out.label;

    logs.push({
      date: new Date().toLocaleString(),
      score: out.productivity_score,
      label: out.label
    });

    localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    updateTrend();
    renderTable();
    renderChart();
    statusText.textContent = "Done ✓ (Missing values auto-filled if any)";
    nlInput.value = "";
  }

  function updateTrend() {
    if (logs.length < 2) { trendText.textContent = "—"; return; }
    trendText.textContent =
      logs.at(-1).score >= logs.at(-2).score ? "Improving 📈" : "Declining 📉";
  }

  function renderTable() {
    tableBody.innerHTML = "";
    logs.forEach(r => {
      tableBody.innerHTML += `
        <tr>
          <td class="p-2 border">${r.date}</td>
          <td class="p-2 border">${Number(r.score).toFixed(2)}</td>
          <td class="p-2 border">${r.label}</td>
        </tr>`;
    });
  }

  function renderChart() {
    const labels = logs.map(l => l.date);
    const data = logs.map(l => Number(l.score));
    if (chart) chart.destroy();
    chart = new Chart(trendChart, {
      type: "line",
      data: { labels, datasets: [{ data, tension: 0.3 }] },
      options: { plugins: { legend: { display: false } }, scales: { x: { display: false } } }
    });
  }

  exportBtn.onclick = () => {
    if (!logs.length) return alert("No data");
    const rows = [["date","score","label"].join(",")];
    logs.forEach(r => rows.push([r.date, r.score, r.label].map(v => `"${v}"`).join(",")));
    const blob = new Blob([rows.join("\n")], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "productivity_logs.csv";
    a.click();
  };

  analyzeBtn.onclick = analyzeDay;
  renderTable();
  renderChart();
  updateTrend();
</script>
</body>
</html>
